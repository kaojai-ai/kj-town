name: Deploy Production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - lint
      - test

    env:
      BUCKET: ${{ vars.AWS_S3_BUCKET }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Ensure AWS deployment config is present
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_GITHUB_PUBLIC_REPO_DEPLOYMENT_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_GITHUB_PUBLIC_REPO_DEPLOYMENT_SECRET }}
        run: |
          if [ -z "${BUCKET}" ]; then
            echo "BUCKET is not set" >&2
            exit 1
          fi

          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION is not set" >&2
            exit 1
          fi

          if [ -z "${AWS_ACCESS_KEY_ID}" ]; then
            echo "AWS_ACCESS_KEY_ID is not set" >&2
            exit 1
          fi

          if [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "AWS_SECRET_ACCESS_KEY is not set" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_GITHUB_PUBLIC_REPO_DEPLOYMENT_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_PUBLIC_REPO_DEPLOYMENT_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static assets (non-HTML)
        run: |
          aws s3 sync ./dist s3://$BUCKET \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync HTML (cache short)
        run: |
          aws s3 sync ./dist s3://$BUCKET \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=86400, must-revalidate"

      - name: Create CloudFront invalidation
        if: env.DIST_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/" "/index.html"
